<script>
    function sendNotification2() {
        // 1. Check browser support
        if (!("Notification" in window)) {
            alert("This browser does not support desktop notifications.");
            return;
        }

        // 2. Handle permissions
        if (Notification.permission === "granted") {
            displayNotification();
        } else if (Notification.permission !== "denied") {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    displayNotification();
                }
            });
        } else {
            alert("Notifications are blocked. Please enable them in settings.");
        }
    }

    function displayNotification() {
        const options = {
            body: "Visit billionbd on YouTube for more content!",
            icon: "https://cdn-icons-png.flaticon.com/512/14550/14550446.png",
            badge: "https://cdn-icons-png.flaticon.com/512/9195/9195102.png",
            // The banner image you provided
            image: "https://cdn-share-sprites.flaticon.com/pack/4/4105/4105442-stay-at-home_3x2.jpg",
            vibrate: [200, 100, 200],
            requireInteraction: true 
        };

        const n = new Notification("New Update from BillionBD", options);

        // 3. Handle the click to YouTube
        n.onclick = function(event) {
            event.preventDefault(); 
            window.open("https://www.youtube.com/@billionbd", "_blank");
            n.close();
        };
    }
</script>
